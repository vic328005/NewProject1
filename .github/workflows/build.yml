name: Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  GODOT_VERSION: 4.6.0

jobs:
  export:
    name: Export (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Windows
            os: windows-latest
            preset: Windows Desktop
            export_path: build/windows/NewProject1.exe
            artifact_name: windows-build
            artifact_path: build/windows
          - label: macOS
            os: macos-latest
            preset: macOS
            export_path: build/macos/NewProject1.zip
            artifact_name: macos-build
            artifact_path: build/macos

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: ${{ env.GODOT_VERSION }}
          include-templates: true

      - name: Verify Godot version
        run: godot --version

      - name: Export project
        run: |
          mkdir -p "$(dirname "${{ matrix.export_path }}")"
          godot --headless --path . --export-release "${{ matrix.preset }}" "${{ matrix.export_path }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: export
    if: github.ref_type == 'tag'

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Package release assets
        run: |
          mkdir -p release-files
          cd release-artifacts/windows-build
          zip -r ../../release-files/NewProject1-windows.zip .
          cd ../..
          cp release-artifacts/macos-build/NewProject1.zip release-files/NewProject1-macos.zip

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-files/NewProject1-windows.zip
            release-files/NewProject1-macos.zip
